<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Handpan Zone Editor</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #e0e0e0; font-family: system-ui, sans-serif; font-size: 13px; overflow: hidden; }

    #app { display: flex; height: 100vh; }

    /* ── Viewport ── */
    #vp-wrap { position: relative; flex: 1; }
    canvas { display: block; width: 100%; height: 100%; }
    #labels { position: absolute; inset: 0; pointer-events: none; }
    .zone-label {
      position: absolute; transform: translate(-50%, -50%);
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; color: #000;
      border: 2px solid rgba(255,255,255,0.7);
      pointer-events: none; display: none;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px; flex-shrink: 0;
      background: #161616; border-left: 1px solid #2a2a2a;
      display: flex; flex-direction: column; overflow-y: auto;
    }
    #sidebar h2 { padding: 14px 16px 4px; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: .08em; }

    /* Zone grid */
    #zone-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px 16px 12px; }
    .zone-btn {
      padding: 6px 2px; border-radius: 6px; border: 2px solid transparent;
      cursor: pointer; font-weight: 700; font-size: 12px; color: #111;
      opacity: 0.5; transition: opacity .15s, border-color .15s, transform .1s;
    }
    .zone-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .zone-btn.active { opacity: 1; border-color: #fff; }
    .zone-btn.placed { opacity: 0.9; }

    /* Info panel */
    #info-panel { padding: 0 16px 12px; border-bottom: 1px solid #2a2a2a; }
    #info-panel p { color: #777; font-size: 11px; margin-bottom: 6px; }
    #coords { background: #0f0f0f; border-radius: 6px; padding: 8px 10px; font-family: monospace; font-size: 12px; color: #aef; line-height: 1.7; }
    #coords span { color: #777; }

    /* Actions */
    #actions { display: flex; gap: 8px; padding: 10px 16px 12px; border-bottom: 1px solid #2a2a2a; }
    button.action {
      flex: 1; padding: 7px 4px; border-radius: 6px; border: 1px solid #333;
      background: #222; color: #ccc; cursor: pointer; font-size: 12px; transition: background .15s;
    }
    button.action:hover { background: #2e2e2e; }
    button.action.danger { border-color: #5a1a1a; color: #ff8080; }
    button.action.danger:hover { background: #2e1010; }

    /* Instructions */
    #instructions { padding: 10px 16px; color: #666; font-size: 11px; line-height: 1.6; border-bottom: 1px solid #2a2a2a; }
    #instructions strong { color: #999; }

    /* Export */
    #export-section { padding: 10px 16px 16px; flex: 1; display: flex; flex-direction: column; }
    #export-section h2 { margin-bottom: 6px; }
    #export-code {
      flex: 1; resize: none; background: #0a0a0a; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 8px; color: #9dc; font-family: monospace;
      font-size: 11px; line-height: 1.5; outline: none; min-height: 120px;
    }
    #copy-btn {
      margin-top: 8px; padding: 8px; border-radius: 6px; border: 1px solid #333;
      background: #1a2a1a; color: #7c7; cursor: pointer; font-size: 12px; font-weight: 600;
      transition: background .15s;
    }
    #copy-btn:hover { background: #243024; }
    #copy-btn.copied { background: #0f3020; color: #4e4; }

    /* Status bar */
    #status { padding: 6px 16px; font-size: 11px; color: #555; background: #111; border-top: 1px solid #222; }
  </style>
</head>
<body>
<div id="app">
  <!-- 3D Viewport -->
  <div id="vp-wrap">
    <canvas id="vp"></canvas>
    <div id="labels"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <h2>Zonas</h2>
    <div id="zone-grid"></div>

    <div id="info-panel">
      <p id="zone-name">Zona seleccionada: 0 (Ding)</p>
      <div id="coords">
        <span>x</span> 0.000 &nbsp; <span>y</span> 0.000 &nbsp; <span>z</span> 0.000
      </div>
    </div>

    <div id="actions">
      <button class="action" id="btn-clear-zone">Borrar zona</button>
      <button class="action danger" id="btn-clear-all">Borrar todo</button>
    </div>

    <div id="instructions">
      <strong>Haz clic</strong> en el modelo para colocar la zona activa.<br>
      <strong>Haz clic</strong> en un disco para seleccionarlo.<br>
      <strong>Auto-avanza</strong> a la siguiente zona después de colocar.
    </div>

    <h2 style="padding-top:10px;">Exportar código</h2>
    <div id="export-section">
      <textarea id="export-code" readonly spellcheck="false"></textarea>
      <button id="copy-btn">Copiar TypeScript</button>
    </div>
  </div>
</div>

<div id="status">Cargando modelo…</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';

// ── Constants ────────────────────────────────────────────────────────────────
const NUM_ZONES = 9;
const ZONE_NAMES = ['0 Ding', '1', '2', '3', '4', '5', '6', '7', '8'];
const ZONE_COLORS_HEX = [
  '#FFD700', // 0 gold  — Ding
  '#FF6B6B', // 1 red
  '#FF8C42', // 2 orange
  '#FFEB3B', // 3 yellow
  '#6BCB77', // 4 green
  '#4D96FF', // 5 blue
  '#AB7CFF', // 6 purple
  '#F15BB5', // 7 pink
  '#40E0D0', // 8 turquoise
];
const ZONE_COLORS_THREE = ZONE_COLORS_HEX.map(c => parseInt(c.slice(1), 16));

// Placeholder starting offsets (from handpan.ts) — user replaces these
const DEFAULTS = [
  [ 0.000,  0.040,  0.000],
  [ 0.120,  0.020,  0.000],
  [ 0.090,  0.020,  0.090],
  [ 0.000,  0.020,  0.120],
  [-0.090,  0.020,  0.090],
  [-0.120,  0.020,  0.000],
  [-0.090,  0.020, -0.090],
  [ 0.090,  0.020, -0.090],
  [ 0.000,  0.020, -0.120], // 8 — front (fine-tune on model)
];

// ── State ─────────────────────────────────────────────────────────────────────
const zones = Array.from({ length: NUM_ZONES }, (_, i) => ({
  position: null,  // THREE.Vector3 | null — world space (= local since model at origin)
  placed: false,
}));
let selectedZone = 0;
let handpanGroup = null;
let modelCenter  = new THREE.Vector3();

// ── Three.js setup ────────────────────────────────────────────────────────────
const canvas   = document.getElementById('vp');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111114);

const camera = new THREE.PerspectiveCamera(45, 1, 0.001, 50);
camera.position.set(0, 0.8, 0.9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xfff8e0, 2.0);
sun.position.set(2, 5, 3);
scene.add(sun);
const fill = new THREE.DirectionalLight(0xc0d0ff, 0.5);
fill.position.set(-3, 1, -2);
scene.add(fill);

// Grid
const grid = new THREE.GridHelper(3, 30, 0x222222, 0x1a1a1a);
scene.add(grid);

// ── Zone markers ──────────────────────────────────────────────────────────────
const diskGeometry = new THREE.CircleGeometry(0.10, 48);
const zoneMeshes   = [];
const labelEls     = [];

const labelsContainer = document.getElementById('labels');

for (let i = 0; i < NUM_ZONES; i++) {
  // Disk mesh
  const mat  = new THREE.MeshBasicMaterial({
    color: ZONE_COLORS_THREE[i],
    transparent: true,
    opacity: 0.55,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const disk = new THREE.Mesh(diskGeometry, mat);
  disk.visible = false;
  disk.rotation.x = -Math.PI / 2;
  disk.userData.zoneIndex = i;
  scene.add(disk);
  zoneMeshes.push(disk);

  // Ring outline (selected indicator)
  const ringGeo = new THREE.RingGeometry(0.095, 0.105, 48);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.9,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.visible = false;
  disk.add(ring);
  disk.userData.ring = ring;

  // HTML label
  const lbl = document.createElement('div');
  lbl.className = 'zone-label';
  lbl.textContent = String(i);
  lbl.style.background = ZONE_COLORS_HEX[i];
  labelsContainer.appendChild(lbl);
  labelEls.push(lbl);
}

// ── Sidebar buttons ───────────────────────────────────────────────────────────
const zoneGrid = document.getElementById('zone-grid');
const btnEls   = [];

for (let i = 0; i < NUM_ZONES; i++) {
  const btn = document.createElement('button');
  btn.className = 'zone-btn';
  btn.textContent = ZONE_NAMES[i];
  btn.style.background = ZONE_COLORS_HEX[i] + '55';
  btn.style.borderColor = ZONE_COLORS_HEX[i];
  btn.onclick = () => selectZone(i);
  zoneGrid.appendChild(btn);
  btnEls.push(btn);
}

// ── Load model ────────────────────────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/gltf/');

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

loader.load(
  './gltf/handpan/hand_pan.glb',
  (gltf) => {
    handpanGroup = gltf.scene;
    scene.add(handpanGroup);

    // Fit camera to model
    const box    = new THREE.Box3().setFromObject(handpanGroup);
    const size   = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    modelCenter.copy(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const dist   = maxDim * 2.2;
    camera.position.set(center.x, center.y + dist * 0.6, center.z + dist * 0.9);
    camera.lookAt(center);
    controls.target.copy(center);
    controls.update();

    // Snap grid to model base
    grid.position.y = box.min.y;

    setStatus(`Modelo cargado — ${(size.x * 100).toFixed(0)}×${(size.y * 100).toFixed(0)}×${(size.z * 100).toFixed(0)} cm`);
    updateExport();
    selectZone(0);
  },
  undefined,
  (err) => {
    console.error(err);
    setStatus('Error al cargar el modelo. Asegúrate de que el servidor esté corriendo (npm run dev).');
  },
);

// ── Interaction ───────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse2d   = new THREE.Vector2();
let mouseDownX = 0, mouseDownY = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  mouseDownX = e.clientX; mouseDownY = e.clientY;
});

renderer.domElement.addEventListener('mouseup', (e) => {
  const moved = Math.hypot(e.clientX - mouseDownX, e.clientY - mouseDownY);
  if (moved > 5) return; // was a drag, not a click

  const rect = renderer.domElement.getBoundingClientRect();
  mouse2d.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse2d.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse2d, camera);

  // 1. Click on existing zone marker → select it
  const visibleDisks = zoneMeshes.filter(m => m.visible);
  const diskHits = raycaster.intersectObjects(visibleDisks, false);
  if (diskHits.length > 0) {
    selectZone(diskHits[0].object.userData.zoneIndex);
    return;
  }

  // 2. Click on model surface → place selected zone
  if (!handpanGroup) return;
  const modelHits = raycaster.intersectObject(handpanGroup, true);
  if (modelHits.length > 0) {
    placeZone(selectedZone, modelHits[0].point, modelHits[0].face?.normal);
    // Auto-advance to next unplaced zone
    const next = findNextUnplaced(selectedZone);
    if (next !== -1) selectZone(next);
  }
});

function findNextUnplaced(from) {
  for (let i = 1; i <= NUM_ZONES; i++) {
    const idx = (from + i) % NUM_ZONES;
    if (!zones[idx].placed) return idx;
  }
  return -1;
}

// ── Zone management ───────────────────────────────────────────────────────────
function selectZone(i) {
  selectedZone = i;
  btnEls.forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
  });
  zoneMeshes.forEach((m, idx) => {
    m.userData.ring.visible = (idx === i && m.visible);
  });
  updateInfoPanel();
}

function placeZone(i, worldPoint, faceNormal) {
  zones[i].position = worldPoint.clone();
  zones[i].placed   = true;

  const disk = zoneMeshes[i];
  disk.position.copy(worldPoint);
  disk.visible = true;

  // Orient disk along the surface normal
  if (faceNormal) {
    const worldNormal = faceNormal.clone().transformDirection(
      zoneMeshes[i] /* wrong — need the hit object's matrix */
    );
    // Simpler fallback: keep rotation.x = -PI/2 (face up, good for horizontal pans)
  }
  disk.position.y += 0.003; // slight lift to avoid z-fighting
  disk.rotation.x = -Math.PI / 2;

  // Update ring visibility for selected
  disk.userData.ring.visible = (i === selectedZone);

  btnEls[i].classList.add('placed');
  updateInfoPanel();
  updateExport();
  setStatus(`Zona ${i} colocada en (${fmt(worldPoint.x)}, ${fmt(worldPoint.y)}, ${fmt(worldPoint.z)})`);
}

function clearZone(i) {
  zones[i].position = null;
  zones[i].placed   = false;
  zoneMeshes[i].visible = false;
  btnEls[i].classList.remove('placed');
  updateInfoPanel();
  updateExport();
}

function clearAll() {
  for (let i = 0; i < NUM_ZONES; i++) clearZone(i);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function fmt(v) { return (v >= 0 ? ' ' : '') + v.toFixed(3); }

function updateInfoPanel() {
  const z = zones[selectedZone];
  document.getElementById('zone-name').textContent =
    `Zona: ${ZONE_NAMES[selectedZone]}${z.placed ? ' ✓' : ' — sin colocar'}`;

  const c = document.getElementById('coords');
  if (z.placed) {
    const p = z.position;
    c.innerHTML = `<span>x</span> ${fmt(p.x)} &nbsp; <span>y</span> ${fmt(p.y)} &nbsp; <span>z</span> ${fmt(p.z)}`;
  } else {
    c.innerHTML = `<span>x</span> —  &nbsp; <span>y</span> —  &nbsp; <span>z</span> — `;
  }
}

function updateExport() {
  const lines = zones.map((z, i) => {
    const comment = i === 0 ? ' // 0 Ding centre' : ` // ${i}`;
    if (!z.placed) return `  [ 0.000,  0.000,  0.000],${comment} — ⚠ no colocado`;
    const p = z.position;
    return `  [${fmt(p.x)}, ${fmt(p.y)}, ${fmt(p.z)}],${comment}`;
  });

  document.getElementById('export-code').value =
    `// Pega esto en src/handpan.ts\n` +
    `const ZONE_OFFSETS: [number, number, number][] = [\n` +
    lines.join('\n') + '\n' +
    `];\n\n` +
    `// Radio por zona (metros) — zona 0 más grande para el Ding\n` +
    `const ZONE_RADII: number[] = [\n` +
    `  0.18, // 0 Ding — más grande\n` +
    zones.slice(1).map((_, i) => `  0.15, // ${i + 1}`).join('\n') + '\n' +
    `];\n`;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Button handlers ───────────────────────────────────────────────────────────
document.getElementById('btn-clear-zone').onclick = () => clearZone(selectedZone);
document.getElementById('btn-clear-all').onclick  = () => clearAll();
document.getElementById('copy-btn').onclick = () => {
  const ta  = document.getElementById('export-code');
  const btn = document.getElementById('copy-btn');

  // Primary: Clipboard API
  const showCopied = () => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar TypeScript'; btn.classList.remove('copied'); }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(showCopied).catch(() => {
      // Fallback: select + execCommand
      ta.select();
      document.execCommand('copy');
      showCopied();
    });
  } else {
    // Fallback for non-HTTPS or permission denied
    ta.select();
    document.execCommand('copy');
    showCopied();
  }
};

// ── Resize ────────────────────────────────────────────────────────────────────
function onResize() {
  const wrap = document.getElementById('vp-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(onResize).observe(document.getElementById('vp-wrap'));
onResize();

// ── Render loop ───────────────────────────────────────────────────────────────
const _proj  = new THREE.Vector3();
const _vw    = { w: 0, h: 0 };

function updateLabels() {
  const canvas = renderer.domElement;
  _vw.w = canvas.clientWidth;
  _vw.h = canvas.clientHeight;

  for (let i = 0; i < NUM_ZONES; i++) {
    const lbl  = labelEls[i];
    const disk = zoneMeshes[i];
    if (!disk.visible) { lbl.style.display = 'none'; continue; }

    _proj.copy(disk.position).project(camera);
    if (_proj.z > 1) { lbl.style.display = 'none'; continue; }

    lbl.style.display = 'flex';
    lbl.style.left = ((_proj.x + 1) / 2 * _vw.w) + 'px';
    lbl.style.top  = ((-_proj.y + 1) / 2 * _vw.h) + 'px';
  }
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  updateLabels();
}
animate();

// ── Initial UI state ──────────────────────────────────────────────────────────
selectZone(0);
updateExport();
</script>
</body>
</html>
